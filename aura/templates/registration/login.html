{% extends "base.html" %}

{% block title %}Entrar — AURA{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Entrar</h1>

          <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}

            <div class="mb-3">
              <label class="form-label" for="{{ form.username.id_for_label }}">Usuário</label>
              {{ form.username }}
              <div class="text-danger small">{{ form.username.errors }}</div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="{{ form.password.id_for_label }}">Senha</label>
              {{ form.password }}
              <div class="text-danger small">{{ form.password.errors }}</div>
            </div>

            <button class="btn btn-dark w-100" type="submit">Entrar</button>
          </form>

          <div class="mt-3 small">
            Não tem conta? <a href="{% url 'signup' %}">Criar agora</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
